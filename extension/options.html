<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Flashcards — Options</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; max-width: 520px; margin: 30px auto; padding: 0 16px; color: #1f2333; }
    h1 { font-size: 20px; }
    p.muted { color: #6b7280; font-size: 14px; }
    label { display: block; font-size: 13px; color: #6b7280; margin: 12px 0 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { margin-top: 16px; background: #4f46e5; color: #fff; border: 0; border-radius: 10px; padding: 11px 18px; font-size: 15px; cursor: pointer; }
    #msg { margin-top: 12px; font-size: 14px; color: #10b981; }
  </style>
</head>
<body>
  <h1>Word Flashcards — Options</h1>
  <p class="muted">These keys are stored only in this browser and are sent directly to Anthropic and GitHub. They are never put in the repo.</p>

  <label>Anthropic API key</label>
  <input id="anthropicKey" type="password" placeholder="sk-ant-…" autocomplete="off" />
  <label>AI model</label>
  <input id="model" type="text" placeholder="claude-3-5-haiku-latest" />
  <label>GitHub token (fine-grained PAT — Contents read/write)</label>
  <input id="githubToken" type="password" placeholder="github_pat_…" autocomplete="off" />

  <div class="grid2">
    <div><label>Owner</label><input id="owner" type="text" /></div>
    <div><label>Repo</label><input id="repo" type="text" /></div>
  </div>
  <div class="grid2">
    <div><label>Branch</label><input id="branch" type="text" /></div>
    <div><label>Inbox folder</label><input id="inboxDir" type="text" /></div>
  </div>

  <button id="save">Save</button>
  <div id="msg"></div>

  <script src="options.js"></script>
</body>
</html>
